target-version = "py38"
line-length = 100

[lint]
select = ["E", "F", "I", "UP"]
ignore = [
    "UP007",  # Use X | Y for Union — forbidden on Python 3.8
    "UP006",  # Use type instead of Type — forbidden on Python 3.8
]

[lint.per-file-ignores]
"src/aurea/vendor/**" = ["ALL"]

[format]
quote-style = "double"
indent-style = "space"
